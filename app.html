<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>KEP Schedule</title>
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="KEP">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --surface: #151b23;
      --surface-2: #202936;
      --text: #f3f7fa;
      --muted: #94a3b8;
      --primary: #5eead4;
      --primary-text: #06201c;
      --line: rgba(255,255,255,.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: min(760px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top) + 14px) 14px calc(env(safe-area-inset-bottom) + 24px);
      background:
        radial-gradient(circle at 12% 0%, rgba(94,234,212,.14), transparent 18rem),
        linear-gradient(180deg, #101720 0%, #0d1117 46%);
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 2px 14px;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: var(--primary-text);
      background: var(--primary);
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 3px;
    }

    .panel {
      background: rgba(21,27,35,.92);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--text);
      padding: 0 12px;
      font-size: 16px;
    }

    .suggestions {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }

    .suggestion {
      border: 0;
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--text);
      text-align: left;
      padding: 11px 12px;
      font-size: 15px;
    }

    .days, .weeks {
      display: grid;
      gap: 6px;
    }

    .days { grid-template-columns: repeat(7, minmax(0, 1fr)); }
    .weeks { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .chip {
      min-height: 38px;
      border: 0;
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      font-weight: 800;
    }

    .chip.active {
      background: var(--primary);
      color: var(--primary-text);
    }

    .day-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .day-title strong {
      font-size: 26px;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
    }

    .lessons {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .lesson {
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 14px;
    }

    .lesson-time {
      color: var(--primary);
      font-weight: 900;
      margin-bottom: 6px;
    }

    .lesson-subject {
      font-size: 17px;
      font-weight: 750;
      line-height: 1.35;
    }

    .lesson-meta {
      color: var(--muted);
      margin-top: 5px;
      font-size: 14px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 28px 12px;
    }

    .install {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 420px) {
      .days {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="logo">KEP</div>
      <div>
        <h1>KEP Schedule</h1>
        <div class="sub">Веб-версія для iPhone</div>
      </div>
    </header>

    <section class="panel install">
      iPhone: відкрийте цю сторінку в Safari, натисніть Share і виберіть Add to Home Screen.
    </section>

    <section class="panel">
      <label for="profile">Група або викладач</label>
      <input id="profile" placeholder="Наприклад: КН-21 або Мельничук" autocomplete="off">
      <div id="suggestions" class="suggestions"></div>
    </section>

    <section class="panel">
      <div class="days" id="days"></div>
    </section>

    <section class="panel">
      <div class="weeks" id="weeks"></div>
    </section>

    <section class="panel">
      <div class="day-title">
        <strong id="selectedDay">Розклад</strong>
        <span class="status" id="status">Завантаження</span>
      </div>
      <div class="lessons" id="lessons"></div>
    </section>
  </main>

  <script>
    const API_URL = "https://kep.nung.edu.ua/api/schedule";
    const lessonTimes = {
      1: "08:00-09:20",
      2: "09:30-10:50",
      3: "11:10-12:30",
      4: "12:40-14:00",
      5: "14:10-15:30",
      6: "15:40-17:00",
      7: "17:10-18:30",
      8: "18:40-20:00"
    };
    const days = ["понеділок", "вівторок", "середа", "четвер", "п'ятниця", "субота", "неділя"];
    const shortDays = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Нд"];
    const state = {
      book: null,
      profile: JSON.parse(localStorage.getItem("kep.profile") || "null"),
      day: ukrainianDay(new Date()),
      week: currentStudyWeek(new Date())
    };

    const profileInput = document.getElementById("profile");
    const suggestionsEl = document.getElementById("suggestions");
    const daysEl = document.getElementById("days");
    const weeksEl = document.getElementById("weeks");
    const lessonsEl = document.getElementById("lessons");
    const selectedDayEl = document.getElementById("selectedDay");
    const statusEl = document.getElementById("status");

    if (state.profile) profileInput.value = state.profile.target;

    init();

    async function init() {
      renderControls();
      renderLessons();
      try {
        const response = await fetch(API_URL, { cache: "no-store" });
        const payload = await response.json();
        state.book = payload.groups || payload.data || payload;
        localStorage.setItem("kep.schedule", JSON.stringify(state.book));
        statusEl.textContent = "Оновлено";
      } catch (error) {
        const cached = localStorage.getItem("kep.schedule");
        if (cached) {
          state.book = JSON.parse(cached);
          statusEl.textContent = "Офлайн";
        } else {
          statusEl.textContent = "Немає даних";
        }
      }
      renderSuggestions("");
      renderLessons();
      if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
    }

    profileInput.addEventListener("input", event => {
      renderSuggestions(event.target.value);
    });

    function renderControls() {
      daysEl.innerHTML = days.map((day, index) => `
        <button class="chip ${state.day === day ? "active" : ""}" data-day="${day}">${shortDays[index]}</button>
      `).join("");
      daysEl.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          state.day = button.dataset.day;
          renderControls();
          renderLessons();
        });
      });

      weeksEl.innerHTML = [1,2,3,4].map(week => `
        <button class="chip ${state.week === week ? "active" : ""}" data-week="${week}">${week}</button>
      `).join("");
      weeksEl.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          state.week = Number(button.dataset.week);
          renderControls();
          renderLessons();
        });
      });
    }

    function renderSuggestions(query) {
      if (!state.book || query.trim().length < 2) {
        suggestionsEl.innerHTML = "";
        return;
      }
      const normalized = normalize(query);
      const groups = Object.keys(state.book)
        .filter(group => normalize(group).includes(normalized))
        .slice(0, 5)
        .map(group => ({ role: "student", target: group }));
      const teachers = [...new Set(Object.values(state.book)
        .flatMap(days => Object.values(days).flat())
        .flatMap(lesson => String(lesson.teacher || "").split(/\s*(?:\||,)\s*/))
        .map(value => value.trim())
        .filter(Boolean))]
        .filter(teacher => normalize(teacher).includes(normalized))
        .slice(0, 5)
        .map(teacher => ({ role: "teacher", target: teacher }));
      const items = [...groups, ...teachers].slice(0, 8);
      suggestionsEl.innerHTML = items.map(item => `
        <button class="suggestion" data-role="${item.role}" data-target="${escapeHtml(item.target)}">
          ${escapeHtml(item.target)} · ${item.role === "student" ? "група" : "викладач"}
        </button>
      `).join("");
      suggestionsEl.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          state.profile = { role: button.dataset.role, target: button.dataset.target };
          localStorage.setItem("kep.profile", JSON.stringify(state.profile));
          profileInput.value = state.profile.target;
          suggestionsEl.innerHTML = "";
          renderLessons();
        });
      });
    }

    function renderLessons() {
      selectedDayEl.textContent = capitalize(state.day);
      if (!state.book) {
        lessonsEl.innerHTML = `<div class="empty">Завантаження розкладу</div>`;
        return;
      }
      if (!state.profile) {
        lessonsEl.innerHTML = `<div class="empty">Виберіть групу або викладача</div>`;
        return;
      }
      if (state.day === "неділя") {
        lessonsEl.innerHTML = `<div class="empty">На цей день занять немає</div>`;
        return;
      }
      const lessons = lessonsForProfile().filter(lesson => weeksFor(lesson.week).includes(state.week));
      if (!lessons.length) {
        lessonsEl.innerHTML = `<div class="empty">Пар немає</div>`;
        return;
      }
      lessonsEl.innerHTML = lessons.sort((a, b) => Number(a.number) - Number(b.number)).map(lesson => `
        <article class="lesson">
          <div class="lesson-time">${lesson.number} пара · ${lessonTimes[lesson.number] || ""}</div>
          <div class="lesson-subject">${escapeHtml(lesson.subject || "")}</div>
          <div class="lesson-meta">${escapeHtml(lesson.teacher || lesson.groupContext || "")}</div>
          <div class="lesson-meta">${escapeHtml(lesson.cabinet || "Кабінет не вказано")}</div>
        </article>
      `).join("");
    }

    function lessonsForProfile() {
      if (state.profile.role === "student") {
        return ((state.book[state.profile.target] || {})[state.day] || []);
      }
      return Object.entries(state.book).flatMap(([group, groupDays]) =>
        (groupDays[state.day] || [])
          .filter(lesson => teacherMatches(state.profile.target, lesson.teacher || ""))
          .map(lesson => ({ ...lesson, groupContext: group }))
      );
    }

    function weeksFor(value) {
      if (!value) return [1,2,3,4];
      const result = [];
      String(value).replace(/\s+/g, "").split(",").forEach(part => {
        if (part.includes("-")) {
          const [from, to] = part.split("-").map(Number);
          for (let week = from; week <= to; week++) result.push(week);
        } else {
          const week = Number(part);
          if (week) result.push(week);
        }
      });
      return [...new Set(result.filter(week => week >= 1 && week <= 4))];
    }

    function teacherMatches(target, raw) {
      const wanted = normalize(target.replace(/\s*\(.*?\)\s*$/, ""));
      return String(raw).split(/\s*(?:\||,)\s*/).some(item =>
        normalize(item.replace(/\s*\(.*?\)\s*$/, "")) === wanted
      );
    }

    function normalize(value) {
      return String(value).toLowerCase()
        .replace(/[’ʼ`]/g, "'")
        .replace(/ё/g, "е")
        .replace(/ы/g, "и")
        .replace(/э/g, "е")
        .replace(/[^a-zа-яіїєґ0-9']/g, "");
    }

    function ukrainianDay(date) {
      return days[(date.getDay() + 6) % 7];
    }

    function currentStudyWeek(date) {
      const year = date.getFullYear();
      const sem1 = date.getMonth() + 1 >= 9 ? new Date(year, 8, 1) : new Date(year - 1, 8, 1);
      const sem2 = date.getMonth() + 1 >= 9 ? new Date(year + 1, 0, 12) : new Date(year, 0, 12);
      const start = date >= sem2 ? sem2 : date >= sem1 ? sem1 : new Date(year - 1, 8, 1);
      const monday = new Date(start);
      monday.setDate(start.getDate() - ((start.getDay() + 6) % 7));
      return (Math.floor((date - monday) / (7 * 24 * 60 * 60 * 1000)) % 4) + 1;
    }

    function capitalize(value) {
      return value ? value[0].toUpperCase() + value.slice(1) : value;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }
  </script>
</body>
</html>

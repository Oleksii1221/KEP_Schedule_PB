<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KEP Schedule</title>
  <meta name="description" content="KEP Schedule - мобільний розклад для Android та Telegram-бот.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --panel: #151b23;
      --panel-soft: #1d2530;
      --text: #f3f7fa;
      --muted: #94a3b8;
      --primary: #5eead4;
      --accent: #facc15;
      --line: rgba(255,255,255,.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 12%, rgba(94,234,212,.16), transparent 28rem),
        radial-gradient(circle at 88% 18%, rgba(250,204,21,.12), transparent 24rem),
        linear-gradient(135deg, #0d1117 0%, #111827 58%, #071b1a 100%);
    }

    main {
      width: min(1040px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, .9fr);
      gap: 40px;
      align-items: center;
      padding: 48px 0;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--primary);
      font-weight: 700;
      letter-spacing: 0;
      margin-bottom: 28px;
    }

    .mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: rgba(94,234,212,.14);
      border: 1px solid rgba(94,234,212,.32);
    }

    h1 {
      margin: 0;
      max-width: 560px;
      font-size: clamp(34px, 5.2vw, 58px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      max-width: 620px;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.65;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 30px;
    }

    .download {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-height: 54px;
      padding: 0 22px;
      border-radius: 8px;
      color: #06201c;
      background: var(--primary);
      text-decoration: none;
      font-size: 17px;
      font-weight: 800;
      box-shadow: 0 18px 40px rgba(94,234,212,.22);
    }

    .telegram {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-height: 54px;
      padding: 0 22px;
      border-radius: 8px;
      color: var(--text);
      background: rgba(255,255,255,.08);
      border: 1px solid var(--line);
      text-decoration: none;
      font-size: 17px;
      font-weight: 800;
    }

    .android,
    .telegram-icon {
      width: 24px;
      height: 24px;
      fill: currentColor;
      flex: 0 0 auto;
    }

    .phone {
      min-height: 560px;
      border-radius: 34px;
      padding: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.04));
      border: 1px solid var(--line);
      box-shadow: 0 30px 80px rgba(0,0,0,.42);
    }

    .screen {
      height: 100%;
      border-radius: 24px;
      overflow: hidden;
      background: var(--bg);
      border: 1px solid rgba(255,255,255,.08);
      padding: 18px;
    }

    .top {
      height: 122px;
      border-radius: 8px;
      background: var(--panel);
      display: grid;
      place-items: center;
      text-align: center;
      border: 1px solid rgba(94,234,212,.22);
    }

    .day {
      color: var(--primary);
      font-size: 30px;
      font-weight: 900;
    }

    .group {
      color: var(--muted);
      margin-top: 6px;
    }

    .weeks {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin: 14px 0;
      padding: 5px;
      border-radius: 8px;
      background: var(--panel);
    }

    .week {
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      color: var(--muted);
      font-weight: 800;
    }

    .week.active {
      color: #06201c;
      background: var(--primary);
    }

    .lesson {
      padding: 14px;
      margin-top: 10px;
      border-radius: 8px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.06);
    }

    .lesson strong {
      display: block;
      color: var(--primary);
      margin-bottom: 6px;
    }

    .lesson span {
      display: block;
      color: var(--muted);
      margin-top: 4px;
    }

    .empty {
      padding: 28px 12px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed rgba(255,255,255,.14);
      border-radius: 8px;
      background: rgba(255,255,255,.03);
    }

    footer {
      width: min(1040px, calc(100% - 32px));
      margin: -36px auto 32px;
      color: rgba(148,163,184,.7);
      font-size: 14px;
    }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
      }

      .phone {
        min-height: 470px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section>
      <div class="brand">
        <div class="mark">KEP</div>
        <span>KEP Schedule</span>
      </div>
      <h1>Розклад, який зручно носити в телефоні.</h1>
      <div class="actions">
        <a class="download" href="downloads/android/master/KEP_Schedule.apk" download>
          <svg class="android" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M17.6 9.48 19.32 6.5a.5.5 0 0 0-.86-.5l-1.77 3.06A10.05 10.05 0 0 0 12 8a10.05 10.05 0 0 0-4.69 1.06L5.54 6a.5.5 0 1 0-.86.5L6.4 9.48A8.25 8.25 0 0 0 3.75 15.5h16.5a8.25 8.25 0 0 0-2.65-6.02ZM8 13.25a1 1 0 1 1 0-2 1 1 0 0 1 0 2Zm8 0a1 1 0 1 1 0-2 1 1 0 0 1 0 2ZM4 17v-1h16v1a2 2 0 0 1-2 2h-1v2.5a1 1 0 1 1-2 0V19H9v2.5a1 1 0 1 1-2 0V19H6a2 2 0 0 1-2-2Z"/>
          </svg>
          Download
        </a>
        <a class="telegram" href="https://t.me/KEP_Schedule_bot" target="_blank" rel="noopener">
          <svg class="telegram-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21.94 4.16a1.55 1.55 0 0 0-1.96-.88L3.36 9.7c-1.2.47-1.18 2.17.04 2.58l4.19 1.41 1.62 5.17c.36 1.14 1.81 1.48 2.64.62l2.32-2.41 4.33 3.17c1.05.77 2.55.18 2.82-1.09l2.26-13.23c.13-.7-.06-1.35-.64-1.76ZM19.7 5.6l-9.5 8.51-.37 3.43-1.03-3.3 8.37-5.27c.38-.24.09-.82-.32-.63l-10.1 4.69-3.05-1.03L19.7 5.6Z"/>
          </svg>
          Бот з розкладом
        </a>
      </div>
    </section>

    <section class="phone" aria-label="KEP Schedule preview">
      <div class="screen">
        <div class="top">
          <div>
            <div class="day" id="dayName">Сьогодні</div>
            <div class="group">Група: АК-22-01</div>
          </div>
        </div>
        <div class="weeks" id="weeks">
          <div class="week">1</div>
          <div class="week">2</div>
          <div class="week">3</div>
          <div class="week">4</div>
        </div>
        <div id="lessons"></div>
      </div>
    </section>
  </main>
  <footer>З любов'ю Медвідь Олексій та C.C.C. · byKico</footer>
  <script>
    const lessonTimes = {
      1: "08:00-09:20",
      2: "09:30-10:50",
      3: "11:10-12:30",
      4: "12:40-14:00",
      5: "14:10-15:30",
      6: "15:40-17:00",
      7: "17:10-18:30"
    };
    const days = ["понеділок", "вівторок", "середа", "четвер", "п'ятниця", "субота", "неділя"];
    const schedule = {
      "понеділок": [
        { "cabinet": "117", "number": "4", "week": "1,3", "subject": "Інноваційне підприємство та управління" },
        { "cabinet": "117", "number": "5", "week": "1-4", "subject": "Економіка підприємства" },
        { "cabinet": "кц9", "number": "6", "week": "1-4", "subject": "Основи кіберзахисту" },
        { "cabinet": "119", "number": "7", "week": "1-4", "subject": "Програмно-логічні контролери" }
      ],
      "вівторок": [
        { "cabinet": "116", "number": "5", "week": "1,3", "subject": "Інноваційне підприємництво та управління" },
        { "cabinet": "223", "number": "5", "week": "2,4", "subject": "Хмарні технології" },
        { "cabinet": "кц8", "number": "6", "week": "1,3", "subject": "Основи кіберзахисту інформаційних систем" },
        { "cabinet": "117", "number": "6", "week": "2,4", "subject": "Інноваційне підприємництво та управління" },
        { "cabinet": "кц9", "number": "7", "week": "1,3", "subject": "Програмно-логічні контролери" },
        { "cabinet": "115", "number": "7", "week": "2,4", "subject": "Економіка підприємства" }
      ],
      "середа": [
        { "cabinet": "кц10", "number": "4", "week": "1-4", "subject": "Основи теорії атоматичного керування та автоматичні регулятори" },
        { "cabinet": "223", "number": "5", "week": "1-4", "subject": "Хмарні технології" },
        { "cabinet": "105", "number": "6", "week": "1-4", "subject": "Економіка підприємства" }
      ],
      "четвер": [
        { "cabinet": "кц10", "number": "2", "week": "2,4", "subject": "Основи теорії атоматичного керування та автоматичні регулятори" },
        { "cabinet": "кц9", "number": "3", "week": "1-4", "subject": "Програмно-логічні контролери" },
        { "cabinet": "116", "number": "4", "week": "1-4", "subject": "Інноваційне підприємництво та управління" },
        { "cabinet": "223", "number": "5", "week": "1-4", "subject": "Хмарні технології" }
      ],
      "п'ятниця": [
        { "cabinet": "кц1", "number": "5", "week": "1-4", "subject": "Основи кіберзахисту інформаційних систем" },
        { "cabinet": "кц10", "number": "6", "week": "1-4", "subject": "Основи теорії автоматичного керування та автоматичні регулятори" }
      ]
    };

    const today = new Date();
    const day = days[(today.getDay() + 6) % 7];
    const week = currentStudyWeek(today);

    document.getElementById("dayName").textContent = capitalize(day);
    document.querySelectorAll(".week").forEach((item, index) => {
      item.classList.toggle("active", index + 1 === week);
    });

    const lessons = (schedule[day] || [])
      .filter(item => weeksFor(item.week).includes(week))
      .sort((a, b) => Number(a.number) - Number(b.number));

    document.getElementById("lessons").innerHTML = lessons.length
      ? lessons.map(lesson => `
        <div class="lesson">
          <strong>${lesson.number} пара · ${lessonTimes[lesson.number] || ""}</strong>
          ${escapeHtml(lesson.subject)}
          <span>ауд. ${escapeHtml(lesson.cabinet)}</span>
        </div>
      `).join("")
      : `<div class="empty">На сьогодні пар немає</div>`;

    function weeksFor(value) {
      const result = [];
      String(value).replace(/\s+/g, "").split(",").forEach(part => {
        if (part.includes("-")) {
          const [from, to] = part.split("-").map(Number);
          for (let item = from; item <= to; item++) result.push(item);
        } else {
          result.push(Number(part));
        }
      });
      return [...new Set(result.filter(Boolean))];
    }

    function currentStudyWeek(date) {
      const year = date.getFullYear();
      const firstSemester = date.getMonth() + 1 >= 9 ? new Date(year, 8, 1) : new Date(year - 1, 8, 1);
      const secondSemester = date.getMonth() + 1 >= 9 ? new Date(year + 1, 0, 12) : new Date(year, 0, 12);
      const start = date >= secondSemester ? secondSemester : date >= firstSemester ? firstSemester : new Date(year - 1, 8, 1);
      const monday = new Date(start);
      monday.setDate(start.getDate() - ((start.getDay() + 6) % 7));
      return (Math.floor((date - monday) / (7 * 24 * 60 * 60 * 1000)) % 4) + 1;
    }

    function capitalize(value) {
      return value ? value[0].toUpperCase() + value.slice(1) : value;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }
  </script>
</body>
</html>
